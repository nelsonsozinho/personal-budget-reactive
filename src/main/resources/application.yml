server:
  port: 8080
  servlet:
    context-path: /budget

logging:
  file:
    name: /var/log/budget/budget-api.log
  level:
    root: INFO

spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/budget
    username: postgres
    password: postgres
  flyway:
    url: jdbc:postgresql://localhost:5432/budget
    user: postgres
    password: postgres
    validate-on-migrate: true
